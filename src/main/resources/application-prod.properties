# Production profile

# Keep startup resilient when schema drifts
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}

# SQL logs off in production
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Hibernate tuning
spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.jdbc.batch_versioned_data=true

# Conservative pool for micro instances
spring.datasource.hikari.maximum-pool-size=${DB_POOL_MAX_SIZE:5}
spring.datasource.hikari.minimum-idle=${DB_POOL_MIN_IDLE:1}
spring.datasource.hikari.connection-timeout=${DB_POOL_CONNECTION_TIMEOUT_MS:20000}
spring.datasource.hikari.idle-timeout=${DB_POOL_IDLE_TIMEOUT_MS:300000}
spring.datasource.hikari.max-lifetime=${DB_POOL_MAX_LIFETIME_MS:1200000}

# Logging
logging.level.root=INFO
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.type.descriptor.sql=OFF

# Jetty tuning
server.jetty.threads.max=${JETTY_THREADS_MAX:50}
server.jetty.threads.min=${JETTY_THREADS_MIN:8}

# Timeouts
server.connection-timeout=20s

# HTTP/2 (useful when SSL is terminated by app/proxy)
server.http2.enabled=${SERVER_HTTP2_ENABLED:false}

# Actuator metrics tuning for latency visibility
management.endpoints.web.exposure.include=health,info,metrics,prometheus,caches
management.metrics.distribution.percentiles-histogram.http.server.requests=true
management.metrics.distribution.percentiles.http.server.requests=0.5,0.95,0.99
