spring.application.name=backend

# Active profile (prod in EC2)
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# PostgreSQL config (defaults for local Docker)
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/techstock_db}
spring.datasource.username=${DB_USERNAME:techstock_user}
spring.datasource.password=${DB_PASSWORD:techstock_pass}
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP defaults (safe for local/dev)
spring.datasource.hikari.maximum-pool-size=${DB_POOL_MAX_SIZE:8}
spring.datasource.hikari.minimum-idle=${DB_POOL_MIN_IDLE:2}
spring.datasource.hikari.connection-timeout=${DB_POOL_CONNECTION_TIMEOUT_MS:30000}
spring.datasource.hikari.idle-timeout=${DB_POOL_IDLE_TIMEOUT_MS:600000}
spring.datasource.hikari.max-lifetime=${DB_POOL_MAX_LIFETIME_MS:1800000}

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.show-sql=true

# Optional: SQL formatting in logs
spring.jpa.properties.hibernate.format_sql=true

# CORS for Next.js frontend
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000}

# Reverse proxy support (Caddy/Nginx)
server.forward-headers-strategy=framework

# Web server and performance
spring.threads.virtual.enabled=true
server.compression.enabled=true
server.compression.mime-types=application/json,application/xml,text/html,text/plain,text/css,application/javascript
server.compression.min-response-size=2KB
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=20s

# Management and health probes
management.endpoints.web.exposure.include=health,info,metrics,prometheus,caches
management.endpoint.health.probes.enabled=true
management.endpoint.health.show-details=never

# Cache (Caffeine)
spring.cache.type=caffeine
spring.cache.cache-names=productById,productsPage
spring.cache.caffeine.spec=maximumSize=1000,expireAfterWrite=60s,recordStats
