name: Deploy to EC2

on:
  workflow_dispatch:
  workflow_run:
    workflows:
      - Docker Build and Push (ECR)
    types:
      - completed
    branches:
      - main

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  ECR_REPOSITORY: techstock-backend

jobs:
  deploy:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          AWS_REGION: ${{ secrets.AWS_REGION }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: AWS_REGION,AWS_ACCESS_KEY_ID,AWS_SECRET_ACCESS_KEY
          script: |
            set -e
            mkdir -p ~/techstock-backend
            cd ~/techstock-backend

            if [ ! -f docker-compose.ec2.yml ]; then
              echo "Falta docker-compose.ec2.yml en EC2. Copialo desde deploy/docker-compose.ec2.yml"
              exit 1
            fi

            if [ ! -f .env ]; then
              echo "Falta archivo .env en EC2. Copialo usando deploy/ec2.env.example como base"
              exit 1
            fi

            REGISTRY='${{ steps.login-ecr.outputs.registry }}'
            IMAGE_URI="$REGISTRY/${{ env.ECR_REPOSITORY }}:latest"

            sed -i "s|^IMAGE_URI=.*|IMAGE_URI=$IMAGE_URI|" .env

            aws ecr get-login-password --region ${{ env.AWS_REGION }} | docker login --username AWS --password-stdin "$REGISTRY"

            docker compose --env-file .env -f docker-compose.ec2.yml pull
            docker compose --env-file .env -f docker-compose.ec2.yml up -d
